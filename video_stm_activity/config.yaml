seed: 42
device: "cuda"
dtype: "bfloat16"

data:
  videos_dir: "data/videos"
  labels_csv: "data/action_labels.csv"
  frame_stride_seconds: 0.5
  max_frames_per_video: 30


vlm:
  models:
    - name: llava15_7b
      type: llava
      model_id: llava-hf/llava-1.5-7b-hf
    - name: qwen2vl_2b
      type: qwen2vl
      model_id: Qwen/Qwen2-VL-2B-Instruct
    - name: internvl2_2b
      type: internvl
      model_id: OpenGVLab/InternVL2-2B
    - name: smolvlm2_2b
      type: smolvlm
      model_id: HuggingFaceTB/SmolVLM2-2.2B-Instruct
    - name: minicpm_o_26
      type: minicpm
      model_id: openbmb/MiniCPM-o-2_6

  load_in_4bit: true
  max_new_tokens: 120

  prompt: |
    Describe what the person is doing in this frame in 1–2 sentences.
    Mention only what you can see:
    - speaking/talking (yes/no/unclear)
    - gesturing (yes/no/unclear)
    - looking at laptop/screen (yes/no/unclear)
    - video-call UI visible (yes/no/unclear)
    - phone visible/in use (yes/no/unclear)





llm:
  model_id: "mistralai/Mistral-7B-Instruct-v0.2"
  load_in_4bit: true
  max_new_tokens: 64
  temperature: 0.0
  system_prompt: |
    You are a strict classifier.
    Choose ONLY from:
    [meeting, phone_use, eating_drinking, video_call, using_computer]
    If you are not confident, output: label=uncertain
    Do NOT guess.
    Do NOT explain.
    Output only:
    label=<label>

memory:
  mode: "stm"          # "none" or "stm"
  window_seconds: 6
  compress: false
  summary_max_chars: 500

experiment:
  runs: 1
  output_dir: "outputs"
